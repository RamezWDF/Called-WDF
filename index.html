<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Called">
<meta name="theme-color" content="#0D1117">
<link rel="manifest" href="manifest.json">
<title>Called — 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0D1117;
  --bg2: #161B22;
  --bg3: #1C2128;
  --border: rgba(255,255,255,0.08);
  --text: #E6EDF3;
  --text2: #8B949E;
  --text3: #484F58;
  --navy: #2D5BE3;
  --navy-soft: rgba(45,91,227,0.15);
  --crimson: #E53E3E;
  --crimson-soft: rgba(229,62,62,0.12);
  --gold: #D4943A;
  --gold-soft: rgba(212,148,58,0.12);
  --green: #3DAA6A;
  --green-soft: rgba(61,170,106,0.12);
  --teal: #26A89A;
  --teal-soft: rgba(38,168,154,0.12);
  --radius: 14px;
  --radius-sm: 8px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 20px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  overscroll-behavior: none;
}

/* APP SHELL */
.app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}

/* STATUS BAR SPACER */
.status-bar {
  height: calc(var(--safe-top) + 8px);
  background: var(--bg);
  flex-shrink: 0;
}

/* HEADER */
.header {
  padding: 8px 20px 12px;
  flex-shrink: 0;
  border-bottom: .5px solid var(--border);
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.app-name {
  font-family: 'Crimson Pro', serif;
  font-size: 26px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.3px;
}
</page>
</style>
</head>
<body>
<div class="app"><div class="status-bar"></div></div>
</body>
</html>
